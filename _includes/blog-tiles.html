<style>
    .demo-card-wide.mdl-card {
        width: 512px;
        margin-bottom: 48px;
    }
    
</style>

{% for post in site.posts %}

<div class="demo-card-wide mdl-card mdl-shadow--2dp">
    <div class="mdl-card__title" style="padding-bottom: 0px;">
        <h2 class="mdl-card__title-text">{{ post.title }}</h2>
    </div>
    <div class="mdl-card__supporting-text" style="padding-top: 0px; padding-bottom: 0px">
       <h3 class="mdl-card__subtitle-text">{{ post.date | date: "%b %-d, %Y" }}</h3>
    </div>
    <div class="mdl-card__supporting-text">
        {{ post.excerpt }}
    </div>
    <div class="mdl-card__actions mdl-card--border">
        <a href="{{ post.url | prepend: site.baseurl }}" class="mdl-button mdl-button--colored mdl-button--accent mdl-js-button mdl-js-ripple-effect">
      Read More
    </a>
    </div>
    <!--<div class="mdl-card__menu">
        <button class="mdl-button mdl-button--icon mdl-button--colored mdl-button--accent mdl-js-button mdl-js-ripple-effect">
            <i class="material-icons">share</i>
        </button>
    </div>-->
</div>
  
{% endfor %}
