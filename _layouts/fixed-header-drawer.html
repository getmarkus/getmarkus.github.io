---
layout: default
---
 <!-- The drawer is always open in large screens. The header is always shown,
  even in small screens. -->
<style>
    .mdl-layout__header,
    .mdl-layout__drawer-button,
    .mdl-layout__header .mdl-layout__drawer-button,
    .mdl-layout__header-row .mdl-navigation__link {
        color: white;
    }
    
    .custom-drawer-header {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 16px;
        height: 151px;
        background: url('{{ site.url }}assets/blackelegance_opt.jpg') center / cover;
        color: white;
    }
    
    .mdl-navigation__link .zmdi {
        margin-right: 32px;
    }
    
    .mdl-navigation__link {
        display: -webkit-box !important;
        display: -webkit-flex !important;
        display: -ms-flexbox !important;
        display: flex !important;
        -webkit-box-orient: horizontal;
        -webkit-box-direction: normal;
        -webkit-flex-direction: row;
        -ms-flex-direction: row;
        flex-direction: row;
        -webkit-box-align: center;
        -webkit-align-items: center;
        -ms-flex-align: center;
        align-items: center;
        color: rgba(255, 255, 255, 0.56);
        font-weight: 500;
    }
</style>
<div class="mdl-layout mdl-js-layout mdl-layout--fixed-drawer
            mdl-layout--fixed-header">
    <header class="mdl-layout__header">
        <div class="mdl-layout__header-row">
            <span class="mdl-layout-title">{{ site.name }} - {{ site.title }}</span>
            <div class="mdl-layout-spacer"></div>
            <nav class="mdl-navigation mdl-layout--large-screen-only">
                <a class="mdl-navigation__link" href="{{ site.url }}index.html">Blog</a>
                <a class="mdl-navigation__link" href="{{ site.url }}resume.html">Resume</a>
            </nav>
        </div>
    </header>
    <div class="mdl-layout__drawer">
        <header class="custom-drawer-header">
            <span class="mdl-layout-title">{{ site.name }}</span>
            <span>{{ site.title }}</span>
        </header>
        <nav class="mdl-navigation">
            {% include left_nav.html %}
        </nav>
    </div>
    <main class="mdl-layout__content">
        {{ content }} {% include footer.html %}
    </main>
</div>
